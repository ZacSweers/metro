name: CI

on:
  # Only run push on main
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  # Always run on PRs
  pull_request:

concurrency:
  group: 'ci-${{ github.event.merge_group.head_ref || github.head_ref }}-${{ github.workflow }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Configure JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version-file: .github/workflows/.java-version

      - name: Cache kempt formatter binaries
        uses: actions/cache@v5
        with:
          path: ~/.kempt/cache
          key: kempt-${{ hashFiles('.kempt.toml') }}

      - name: Install kempt
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/ZacSweers/kempt/releases/latest/download/kempt-fmt-installer.sh | sh

      - name: Pre-warm kempt cache
        run: kempt update

      - name: Check formatting
        run: kempt check

  generate-matrix:
    name: "⊹ generate compiler matrix ⊹"
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate matrix
        id: generate
        run: ./scripts/generate-ci-matrix.sh

  core:
    name: "core artifacts / ${{ matrix.kotlin-compiler }}"
    runs-on: ubuntu-latest
    needs: generate-matrix
    # TEMP: dropped from 60 to 30 while debugging the Beta2 hang — failing fast is
    # cheaper than waiting out the original cap.
    timeout-minutes: 30
    strategy:
      # TEMP: restricted to 2.4.0-Beta2 only while debugging the Beta2/RC hang.
      # Restore to `${{ fromJson(needs.generate-matrix.outputs.matrix) }}` when fixed.
      matrix:
        kotlin-compiler: ["2.4.0-Beta2"]
      fail-fast: false
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true
          konan-cache-prefix: ${{ matrix.kotlin-compiler }}

      - name: Start watchdog
        # Heartbeat every 60s. Gradle only emits lifecycle output on task completion — when a task
        # hangs we get silence in the main stream. The watchdog logs interleave so we can pinpoint
        # when the daemon went idle and which JVMs/subprocesses were alive at that moment.
        # Lightweight snapshots also tee to _diagnostics/heartbeat.log so we have an on-disk record
        # if the runner's stdout pipe wedges (as observed on previous Beta2 hangs); heavyweight
        # snapshots (jstack + full process tree) go to _diagnostics/ for artifact upload.
        run: |
          mkdir -p _diagnostics
          nohup bash -c '
            tick=0
            while true; do
              ts=$(date -u +%H:%M:%S)
              tick=$((tick + 1))
              {
                echo "[watchdog $ts] === tick $tick ==="
                echo "[watchdog $ts] uptime:"
                uptime 2>&1 | sed "s/^/[watchdog]   /" || true
                echo "[watchdog $ts] mem:"
                free -h 2>&1 | sed "s/^/[watchdog]   /" || true
                echo "[watchdog $ts] disk:"
                df -h / 2>&1 | sed "s/^/[watchdog]   /" || true
                echo "[watchdog $ts] jps:"
                jps -lvm 2>&1 | sed "s/^/[watchdog]   /" || true
                echo "[watchdog $ts] top:"
                top -bn1 -w512 2>/dev/null | head -25 | sed "s/^/[watchdog]   /" || true
              } | tee -a _diagnostics/heartbeat.log
              # Heavy snapshots → files. jstack every running JVM + ps tree so node/yarn/konan
              # subprocesses (which jps misses) are captured.
              for pid in $(jps -q 2>/dev/null); do
                jstack -l "$pid" > "_diagnostics/jstack-$pid-$ts.txt" 2>/dev/null || true
              done
              ps auxf > "_diagnostics/ps-$ts.txt" 2>/dev/null || true
              sleep 60
            done
          ' >> _diagnostics/watchdog.out 2>&1 &
          echo "WATCHDOG_PID=$!" >> "$GITHUB_ENV"

      - name: Regenerate package locks
        run: |
          # Each matrix Kotlin version may resolve a different NPM dep set, so refresh the
          # kotlin-js-store lockfiles before any task in `check` validates them. Skipped when the
          # matrix version matches the default (the committed lockfiles already match).
          default_kotlin=$(sed -nE 's/^kotlin = "([^"]+)".*/\1/p' gradle/libs.versions.toml)
          if [ "${{ matrix.kotlin-compiler }}" != "$default_kotlin" ]; then
            echo "Regenerating package locks for ${{ matrix.kotlin-compiler }} (default: $default_kotlin)..."
            ./metrow regen --locks-only --version '${{ matrix.kotlin-compiler }}'
          else
            echo "Matrix version matches default ($default_kotlin); skipping regen."
          fi

      - name: Generate tests
        # Regenerate tests per-run on CI to support exclusions, which are unfortunately code-gen
        # level right now.
        run: ./gradlew :compiler-tests:generateTests --console=plain '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      # Test tasks are split into individual steps to bisect the Beta2 hang. --max-workers=1 keeps
      # the visible task order linear so the last "> Task :foo" line before silence unambiguously
      # identifies the offender. --warning-mode all + metro.ciVerbose (testLogging events) +
      # metro.debugCompilerTests (heap dumps to tmp/) keep useful signal without --info's volume.
      # Each step has its own short timeout-minutes so a single hang doesn't burn the whole budget.
      - name: ':compiler:test'
        timeout-minutes: 10
        run: ./gradlew :compiler:test --console=plain --max-workers=1 --warning-mode all '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' -Pmetro.ciVerbose=true ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: ':compiler-tests:test'
        timeout-minutes: 15
        run: ./gradlew :compiler-tests:test --console=plain --max-workers=1 --warning-mode all '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' -Pmetro.ciVerbose=true -Pmetro.debugCompilerTests=true ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: ':gradle-plugin:test'
        timeout-minutes: 10
        run: ./gradlew :gradle-plugin:test --console=plain --max-workers=1 --warning-mode all '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' -Pmetro.ciVerbose=true ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: ':gradle-plugin:functionalTest'
        timeout-minutes: 20
        run: ./gradlew :gradle-plugin:functionalTest --console=plain --max-workers=1 --warning-mode all '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' -Pmetro.ciVerbose=true ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: ':runtime:allTests'
        # Multiplatform runtime tests — forks Node.js (JS/wasmJs/wasmWasi) and Konan (native).
        # Strong hang candidate alongside functionalTest because of those subprocess spawns.
        timeout-minutes: 15
        run: ./gradlew :runtime:allTests --console=plain --max-workers=1 --warning-mode all '-Pmetro.testCompilerVersion=${{ matrix.kotlin-compiler }}' -Pmetro.ciVerbose=true ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: Stop watchdog
        if: always()
        run: |
          if [ -n "${WATCHDOG_PID:-}" ]; then
            kill "$WATCHDOG_PID" 2>/dev/null || true
          fi

      - name: (Fail-only) Upload reports
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: reports-core-${{ matrix.kotlin-compiler }}
          path: |
            **/build/reports/**
            **/build/test-results/**
            tmp/**
            _diagnostics/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure()
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: 'Test Report - core / ${{ matrix.kotlin-compiler }}'

  samples:
    name: samples
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Check samples
        run: |
          # We have to regen package locks because the kotlin yarn/node/etc build tooling is brittle
          ./gradlew -p samples kotlinWasmUpgradePackageLock kotlinUpgradePackageLock --rerun-tasks --no-build-cache --no-configuration-cache --quiet ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}
          ./gradlew -p samples check --continue --quiet ${{ github.ref != 'refs/heads/main' && '-Dorg.gradle.configuration-cache.read-only=true' || '' }}

      - name: (Fail-only) Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports-samples
          path: |
            **/build/reports/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure()
        with:
          report_paths: 'samples/**/build/test-results/**/TEST-*.xml'
          check_name: 'Test Report - samples'

  # Run multiplatform tests on main only to reduce PR time
  # Note: We use step-level conditions instead of job-level to ensure matrix expands and shows nice names
  multiplatform-tests:
    name: ${{ format('multiplatform / {0}{1}', matrix.os, github.ref != 'refs/heads/main' && ' (skipped)' || '') }}
    runs-on: ${{ github.ref == 'refs/heads/main' && matrix.os || 'ubuntu-latest' }}
    permissions:
      checks: write

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Skip on PRs
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping multiplatform tests on PRs to reduce CI time"

      - name: Checkout
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Check runtime and IC tests
        if: github.ref == 'refs/heads/main'
        run: ./gradlew :runtime:allTests :gradle-plugin:functionalTest --continue --quiet

      - name: Check samples
        if: github.ref == 'refs/heads/main'
        run: ./gradlew -p samples test allTests --continue --quiet

      - name: (Fail-only) Upload reports
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: reports-multiplatform-${{ matrix.os }}
          path: |
            **/build/reports/**

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: failure() && github.ref == 'refs/heads/main'
        with:
          report_paths: |
            **/build/test-results/**/TEST-*.xml
            samples/**/build/test-results/**/TEST-*.xml
          check_name: 'Test Report - multiplatform / ${{ matrix.os }}'

  benchmarks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Build Metro benchmark
        run: |
          cd benchmark
          ./run_benchmarks.sh metro --build-only

      - name: (Fail-only) Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports-benchmarks
          path: |
            **/build/reports/**

  # https://jakewharton.com/fan-in-to-a-single-required-github-action/
  final-status:
    if: always()
    runs-on: ubuntu-slim
    needs:
      - format
      - core
      - benchmarks
      - samples
    steps:
      - name: Check
        run: |
          results=$(tr -d '\n' <<< '${{ toJSON(needs.*.result) }}')
          if ! grep -q -v -E '(failure|cancelled)' <<< "$results"; then
            echo "One or more required jobs failed"
            exit 1
          fi

  publish:
    name: Publish snapshot (main only)
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.repository == 'zacsweers/metro'
    needs:
      - final-status

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          konan: true

      - name: Upload snapshot
        # Sonatype keeps giving 429 errors lately, so no need to mark this as failure for now
        continue-on-error: true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SonatypeUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SonatypePassword }}
        run: ./metrow publish
