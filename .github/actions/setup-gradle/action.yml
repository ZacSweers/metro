name: 'Setup Gradle'
description: 'Configures JDK, Gradle wrapper cache, setup-gradle, and optional Konan cache'

inputs:
  encryption-key:
    description: 'Gradle cache encryption key'
    required: true
  cache-read-only:
    description: 'Whether gradle cache is read-only'
    required: false
    default: 'false'
  konan:
    description: 'Whether to set up konan cache'
    required: false
    default: 'false'
  konan-cache-prefix:
    description: 'Extra prefix segment for konan cache key (e.g. matrix.kotlin-compiler)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Configure JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version-file: .github/workflows/.java-version

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: ${{ inputs.cache-read-only }}
        gradle-home-cache-strict-match: true
        cache-encryption-key: ${{ inputs.encryption-key }}
        gradle-home-cache-excludes: |
          caches/jars-9
          caches/transforms-3
          wrapper/dists

    - name: Cache Gradle wrapper
      uses: actions/cache@v5
      with:
        path: ~/.gradle/wrapper/dists
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

    # Split the konan cache so the Kotlin-version-independent toolchain bits don't get duplicated
    # across every per-version cache entry. ~/.konan/dependencies/ holds LLVM, sysroots, and the
    # cross-compilation toolchains — large (~hundreds of MB) and identical across Kotlin versions —
    # so it's cached separately with a single shared key per OS. The version-specific bits
    # (compiled klibs, prebuilt distributions) get the per-Kotlin-version prefix.
    - name: Cache konan toolchain (shared)
      if: inputs.konan == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.konan/dependencies
        key: ${{ runner.os }}-konan-deps-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-konan-deps-

    - name: Cache konan klibs (per Kotlin version)
      if: inputs.konan == 'true'
      uses: actions/cache@v5
      with:
        path: |
          ~/.konan/cache
          ~/.konan/kotlin-native-macos*
          ~/.konan/kotlin-native-mingw*
          ~/.konan/kotlin-native-windows*
          ~/.konan/kotlin-native-linux*
          ~/.konan/kotlin-native-prebuilt-macos*
          ~/.konan/kotlin-native-prebuilt-mingw*
          ~/.konan/kotlin-native-prebuilt-windows*
          ~/.konan/kotlin-native-prebuilt-linux*
        key: ${{ runner.os }}-${{ inputs.konan-cache-prefix && format('{0}-', inputs.konan-cache-prefix) || '' }}konan-klibs-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.konan-cache-prefix && format('{0}-', inputs.konan-cache-prefix) || '' }}konan-klibs-
